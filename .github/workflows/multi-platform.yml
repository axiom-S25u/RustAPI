name: Build RustAPI Mod

on:
  workflow_dispatch:
  push:
    branches:
      - "**"

jobs:
  rust-tests:
    name: Rust Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust tests
        run: cargo test --manifest-path Cargo.toml
        working-directory: .

  build-rustapi:
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: Windows
          os: windows-latest
        - name: macOS
          os: macos-latest
        - name: iOS
          os: macos-latest
          target: iOS
        - name: Android32
          os: ubuntu-latest
          target: Android32
        - name: Android64
          os: ubuntu-latest
          target: Android64

    name: RustAPI ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin, aarch64-apple-ios, armv7-linux-androideabi, aarch64-linux-android

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build RustAPI
        uses: geode-sdk/build-geode-mod@main
        with:
          combine: true
          target: ${{ matrix.config.target }}

  package-rustapi:
    name: Package RustAPI
    runs-on: ubuntu-latest
    needs: build-rustapi

    steps:
      - name: Combine RustAPI
        uses: geode-sdk/build-geode-mod/combine@main
        id: combine

      - name: Upload combined RustAPI
        uses: actions/upload-artifact@v4
        with:
          name: RustAPI-combined
          path: ${{ steps.combine.outputs.build-output }}

  build-testmod:
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: Windows
          os: windows-latest
        - name: macOS
          os: macos-latest
        - name: iOS
          os: macos-latest
          target: iOS
        - name: Android32
          os: ubuntu-latest
          target: Android32
        - name: Android64
          os: ubuntu-latest
          target: Android64

    name: TestMod ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    needs: package-rustapi

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin, aarch64-apple-ios, armv7-linux-androideabi, aarch64-linux-android

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            testmod/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Download RustAPI artifact
        uses: actions/download-artifact@v4
        with:
          name: RustAPI-combined
          path: testmod/deps

      - name: Build TestMod
        uses: geode-sdk/build-geode-mod@main
        with:
          combine: true
          target: ${{ matrix.config.target }}
          build-folder: testmod

  package:
    name: Package All
    runs-on: ubuntu-latest
    needs: build-testmod

    steps:
      - name: Download RustAPI combined
        uses: actions/download-artifact@v4
        with:
          name: RustAPI-combined
          path: final-output

      - name: Combine TestMod
        uses: geode-sdk/build-geode-mod/combine@main
        id: combine-testmod

      - name: Copy TestMod output
        run: cp -r ${{ steps.combine-testmod.outputs.build-output }}/* final-output/

      - name: Upload Build Output
        uses: actions/upload-artifact@v4
        with:
          name: Build Output
          path: final-output